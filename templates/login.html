<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>StockSeer AI — Login</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0a0b0f;
    --surface: #111318;
    --card:    #16181f;
    --border:  rgba(255,255,255,0.08);
    --accent:  #6366f1;
    --accent2: #8b5cf6;
    --green:   #10b981;
    --text:    #f1f5f9;
    --muted:   #64748b;
    --input:   #1e2028;
    --error:   #ef4444;
  }
  html, body { height: 100%; }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', sans-serif;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Animated background */
  .bg-orbs { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
  .orb {
    position: absolute; border-radius: 50%;
    filter: blur(80px); opacity: 0.18; animation: float 8s ease-in-out infinite;
  }
  .orb-1 { width: 500px; height: 500px; background: #6366f1; top: -150px; left: -150px; animation-delay: 0s; }
  .orb-2 { width: 400px; height: 400px; background: #8b5cf6; bottom: -100px; right: -100px; animation-delay: -3s; }
  .orb-3 { width: 300px; height: 300px; background: #06b6d4; top: 40%; left: 60%; animation-delay: -6s; }
  @keyframes float {
    0%,100% { transform: translate(0,0) scale(1); }
    50%      { transform: translate(20px,-20px) scale(1.05); }
  }

  /* Grid overlay */
  .grid-overlay {
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(99,102,241,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.04) 1px, transparent 1px);
    background-size: 48px 48px;
  }

  /* Main card */
  .wrapper { position: relative; z-index: 1; width: 100%; max-width: 440px; padding: 20px; }

  .brand {
    display: flex; align-items: center; gap: 12px;
    justify-content: center; margin-bottom: 32px;
  }
  .brand-icon {
    width: 44px; height: 44px; border-radius: 12px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    display: flex; align-items: center; justify-content: center;
    font-size: 22px; font-weight: 800; color: #fff;
    font-family: 'Space Grotesk', sans-serif;
    box-shadow: 0 0 24px rgba(99,102,241,0.4);
  }
  .brand-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 24px; font-weight: 700;
  }
  .brand-name span { color: var(--accent); }

  .card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 20px;
    padding: 36px 32px;
    backdrop-filter: blur(10px);
    box-shadow: 0 24px 48px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.05);
  }
  .card-title {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 22px; font-weight: 700; text-align: center; margin-bottom: 6px;
  }
  .card-sub { font-size: 14px; color: var(--muted); text-align: center; margin-bottom: 28px; }

  /* Tabs */
  .tabs {
    display: flex; background: var(--input); border-radius: 10px;
    padding: 4px; gap: 4px; margin-bottom: 24px;
  }
  .tab {
    flex: 1; padding: 9px; border-radius: 7px; border: none; background: transparent;
    color: var(--muted); font-size: 14px; font-weight: 500; cursor: pointer;
    transition: all 0.2s; font-family: 'Inter', sans-serif;
  }
  .tab.active {
    background: var(--surface); color: var(--text);
    box-shadow: 0 1px 4px rgba(0,0,0,0.4);
  }

  /* Form */
  .form-group { margin-bottom: 16px; }
  .form-label {
    display: block; font-size: 13px; font-weight: 500;
    color: var(--muted); margin-bottom: 6px;
  }
  .form-input {
    width: 100%; padding: 12px 14px;
    background: var(--input); border: 1.5px solid var(--border);
    border-radius: 10px; color: var(--text); font-size: 14px;
    font-family: 'Inter', sans-serif; outline: none;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .form-input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
  }
  .form-input::placeholder { color: #374151; }

  .input-group { position: relative; }
  .input-icon {
    position: absolute; left: 13px; top: 50%; transform: translateY(-50%);
    color: var(--muted); font-size: 16px; pointer-events: none;
  }
  .input-group .form-input { padding-left: 40px; }
  .toggle-pw {
    position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
    color: var(--muted); cursor: pointer; font-size: 16px;
    background: none; border: none; padding: 0;
  }
  .toggle-pw:hover { color: var(--text); }

  .btn-submit {
    width: 100%; padding: 13px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none; border-radius: 10px;
    color: #fff; font-size: 15px; font-weight: 600;
    font-family: 'Inter', sans-serif; cursor: pointer;
    transition: all 0.2s; margin-top: 4px;
    box-shadow: 0 4px 16px rgba(99,102,241,0.35);
  }
  .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 20px rgba(99,102,241,0.45); }
  .btn-submit:active { transform: translateY(0); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  /* Error/success */
  .alert {
    padding: 11px 14px; border-radius: 9px; font-size: 13px;
    margin-bottom: 16px; display: none; align-items: center; gap: 8px;
  }
  .alert.error   { background: rgba(239,68,68,0.12); border: 1px solid rgba(239,68,68,0.3); color: #fca5a5; }
  .alert.success { background: rgba(16,185,129,0.12); border: 1px solid rgba(16,185,129,0.3); color: #6ee7b7; }
  .alert.show    { display: flex; }

  .divider {
    display: flex; align-items: center; gap: 12px;
    margin: 20px 0; font-size: 12px; color: var(--muted);
  }
  .divider::before, .divider::after {
    content: ''; flex: 1; height: 1px; background: var(--border);
  }

  .demo-creds {
    background: rgba(99,102,241,0.08); border: 1px solid rgba(99,102,241,0.2);
    border-radius: 10px; padding: 14px; margin-top: 20px;
  }
  .demo-creds-title {
    font-size: 11px; font-weight: 600; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px;
  }
  .cred-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 6px;
  }
  .cred-row:last-child { margin-bottom: 0; }
  .cred-label { font-size: 12px; color: var(--muted); }
  .cred-btn {
    background: rgba(99,102,241,0.15); border: 1px solid rgba(99,102,241,0.3);
    color: var(--accent); padding: 4px 12px; border-radius: 6px;
    font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif;
    transition: all 0.15s;
  }
  .cred-btn:hover { background: rgba(99,102,241,0.25); }

  /* Loading spinner */
  .spinner {
    width: 16px; height: 16px; border: 2px solid rgba(255,255,255,0.3);
    border-top-color: #fff; border-radius: 50%;
    animation: spin 0.6s linear infinite; display: inline-block;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* Panel toggle */
  .panel { display: none; }
  .panel.active { display: block; }
</style>
</head>
<body>

<div class="bg-orbs">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="orb orb-3"></div>
</div>
<div class="grid-overlay"></div>

<div class="wrapper">
  <!-- Brand -->
  <div class="brand">
    <div class="brand-icon">S</div>
    <div class="brand-name">Stock<span>Seer</span> AI</div>
  </div>

  <div class="card">
    <div class="card-title">Welcome back</div>
    <div class="card-sub">Sign in to access your ML forecasting dashboard</div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab active" onclick="switchTab('login')">Sign In</button>
      <button class="tab"        onclick="switchTab('register')">Create Account</button>
    </div>

    <!-- Alert -->
    <div class="alert error" id="alert-error">
      <span>⚠</span><span id="alert-msg"></span>
    </div>
    <div class="alert success" id="alert-success">
      <span>✓</span><span id="alert-ok"></span>
    </div>

    <!-- Login Panel -->
    <div class="panel active" id="panel-login">
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" class="form-input" id="login-user" placeholder="Enter username" autocomplete="username">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-input" id="login-pw" placeholder="Enter password" autocomplete="current-password">
          <button class="toggle-pw" onclick="togglePw('login-pw',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-submit" id="btn-login" onclick="doLogin()">
        Sign In
      </button>

      <div class="divider">Quick access</div>
      <div class="demo-creds">
        <div class="demo-creds-title">🔑 Demo Credentials</div>
        <div class="cred-row">
          <span class="cred-label">Admin (full access)</span>
          <button class="cred-btn" onclick="fillCreds('admin','admin123')">Use admin</button>
        </div>
        <div class="cred-row">
          <span class="cred-label">Demo user</span>
          <button class="cred-btn" onclick="fillCreds('demo','demo123')">Use demo</button>
        </div>
      </div>
    </div>

    <!-- Register Panel -->
    <div class="panel" id="panel-register">
      <div class="form-group">
        <label class="form-label">Full Name</label>
        <div class="input-group">
          <span class="input-icon">✏️</span>
          <input type="text" class="form-input" id="reg-name" placeholder="Your full name">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Username</label>
        <div class="input-group">
          <span class="input-icon">👤</span>
          <input type="text" class="form-input" id="reg-user" placeholder="Choose a username">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <div class="input-group">
          <span class="input-icon">🔒</span>
          <input type="password" class="form-input" id="reg-pw" placeholder="Min. 6 characters">
          <button class="toggle-pw" onclick="togglePw('reg-pw',this)" tabindex="-1">👁</button>
        </div>
      </div>
      <button class="btn-submit" id="btn-register" onclick="doRegister()">
        Create Account
      </button>
    </div>
  </div>
</div>

<script>
function switchTab(tab) {
  document.querySelectorAll('.tab').forEach((t,i) => t.classList.toggle('active', (tab==='login'?i===0:i===1)));
  document.getElementById('panel-login').classList.toggle('active', tab==='login');
  document.getElementById('panel-register').classList.toggle('active', tab==='register');
  hideAlerts();
}

function togglePw(id, btn) {
  const inp = document.getElementById(id);
  if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
  else                          { inp.type = 'password'; btn.textContent = '👁'; }
}

function fillCreds(u, p) {
  document.getElementById('login-user').value = u;
  document.getElementById('login-pw').value   = p;
}

function showError(msg) {
  document.getElementById('alert-msg').textContent = msg;
  document.getElementById('alert-error').classList.add('show');
  document.getElementById('alert-success').classList.remove('show');
}
function showSuccess(msg) {
  document.getElementById('alert-ok').textContent = msg;
  document.getElementById('alert-success').classList.add('show');
  document.getElementById('alert-error').classList.remove('show');
}
function hideAlerts() {
  document.getElementById('alert-error').classList.remove('show');
  document.getElementById('alert-success').classList.remove('show');
}

function setLoading(btnId, loading) {
  const btn = document.getElementById(btnId);
  btn.disabled = loading;
  btn.innerHTML = loading ? '<span class="spinner"></span>' : btn.dataset.text;
}

async function doLogin() {
  const btn = document.getElementById('btn-login');
  btn.dataset.text = btn.innerHTML;
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pw').value;
  if (!u || !p) { showError('Please enter username and password.'); return; }
  setLoading('btn-login', true);
  try {
    const res = await fetch('/api/auth/login', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({username:u, password:p})
    });
    const data = await res.json();
    if (data.success) {
      showSuccess(`Welcome back, ${data.user.name}!`);
      setTimeout(() => window.location.href = '/', 800);
    } else {
      showError(data.error || 'Login failed');
    }
  } catch { showError('Server error. Try again.'); }
  finally  { setLoading('btn-login', false); }
}

async function doRegister() {
  const btn = document.getElementById('btn-register');
  btn.dataset.text = btn.innerHTML;
  const name = document.getElementById('reg-name').value.trim();
  const u    = document.getElementById('reg-user').value.trim();
  const p    = document.getElementById('reg-pw').value;
  if (!name||!u||!p) { showError('All fields are required.'); return; }
  setLoading('btn-register', true);
  try {
    const res = await fetch('/api/auth/register', {
      method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({name, username:u, password:p})
    });
    const data = await res.json();
    if (data.success) {
      showSuccess('Account created! Redirecting...');
      setTimeout(() => window.location.href = '/', 900);
    } else {
      showError(data.error || 'Registration failed');
    }
  } catch { showError('Server error. Try again.'); }
  finally  { setLoading('btn-register', false); }
}

// Enter key
document.addEventListener('keydown', e => {
  if (e.key === 'Enter') {
    const panel = document.getElementById('panel-login').classList.contains('active');
    if (panel) doLogin(); else doRegister();
  }
});
</script>
</body>
</html>
